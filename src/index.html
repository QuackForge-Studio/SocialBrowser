<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>Social Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .container { text-align: center; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; color: #e94560; }
    p { font-size: 1rem; opacity: 0.8; }
    .status { margin-top: 2rem; font-size: 0.9rem; }
    .status.ok { color: #4ecca3; }
    .status.error { color: #e94560; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Social Browser</h1>
    <p>Electron desktop app — compatibility spike</p>
    <div class="status" id="status">Initializing...</div>
  </div>
  <script>
    const statusEl = document.getElementById('status');
    statusEl.textContent = 'App loaded successfully';
    statusEl.className = 'status ok';
  </script>
</body>
</html>
