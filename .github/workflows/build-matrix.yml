name: Cross-Platform Release Build Pipeline

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-14
            platform: mac
          - os: ubuntu-latest
            platform: linux

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Get pnpm Store Path
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Show tool versions
        run: |
          node -v
          pnpm -v

      - name: Build All Monorepo Packages
        run: pnpm build

      - name: Run Unit Tests
        run: pnpm --filter @social-browser/main test; pnpm --filter @social-browser/dashboard test

      - name: Package Desktop Binary (${{ matrix.platform }})
        run: pnpm --filter @social-browser/main package:${{ matrix.platform }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SocialBrowser-${{ matrix.platform }}
          path: dist/*

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -d '' assets < <(find release-artifacts -type f -print0)
          gh release create "$GITHUB_REF_NAME" \
            --title "Social Browser $GITHUB_REF_NAME" \
            --generate-notes \
            "${assets[@]}"
