<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>Social Browser — Dashboard</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --sidebar-width: 240px;
      --tab-bar-height: 40px;
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-sidebar: #0f3460;
      --bg-tab-bar: #0d1b3e;
      --accent: #e94560;
      --accent-hover: #ff6b81;
      --text-primary: #eee;
      --text-secondary: #a0a0b8;
      --border-color: #2a2a4a;
      --tab-hover-bg: #2a2a4a;
    }
    html, body {
      width: 100%; height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
    }
    #root { width: 100%; height: 100%; }
    .app-shell { width: 100%; height: 100%; position: relative; }

    /* Tab Bar */
    #tab-bar {
      position: fixed; top: 0; left: var(--sidebar-width); right: 0;
      height: var(--tab-bar-height);
      background: var(--bg-tab-bar);
      border-bottom: 1px solid var(--border-color);
      display: flex; align-items: center;
      padding: 0 8px; gap: 4px; z-index: 100;
    }
    .tab-item {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; height: 28px; border-radius: 4px;
      font-size: 12px; color: var(--text-secondary);
      cursor: pointer; user-select: none;
      border: 1px solid transparent;
      transition: background 0.15s, color 0.15s;
    }
    .tab-item:hover { background: var(--tab-hover-bg); color: var(--text-primary); }
    .tab-item.active { background: var(--bg-primary); color: var(--accent); border-color: var(--accent); }
    .tab-item .tab-close {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; border-radius: 2px;
      font-size: 10px; line-height: 1; opacity: 0.5;
      transition: opacity 0.15s, background 0.15s;
      cursor: pointer;
    }
    .tab-item .tab-close:hover { opacity: 1; background: rgba(233,69,96,0.2); }
    .add-tab-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px; border-radius: 4px;
      font-size: 16px; color: var(--text-secondary);
      cursor: pointer; border: 1px dashed var(--border-color);
      transition: background 0.15s, color 0.15s;
    }
    .add-tab-btn:hover { background: var(--tab-hover-bg); color: var(--accent); }

    /* Sidebar */
    #sidebar {
      position: fixed; top: 0; left: 0;
      width: var(--sidebar-width); height: 100%;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-color);
      display: flex; flex-direction: column; z-index: 100;
    }
    #sidebar .logo {
      padding: 16px; font-size: 18px; font-weight: 700;
      color: var(--accent); border-bottom: 1px solid var(--border-color);
    }
    #sidebar .logo small { display: block; font-size: 10px; font-weight: 400; color: var(--text-secondary); margin-top: 2px; }
    #sidebar nav { flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 2px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 6px;
      font-size: 13px; color: var(--text-secondary);
      cursor: pointer; transition: background 0.15s, color 0.15s; user-select: none;
    }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
    .nav-item.active { background: rgba(233,69,96,0.15); color: var(--accent); }
    .nav-item .nav-icon { width: 20px; text-align: center; font-size: 14px; }
    #sidebar .sidebar-footer {
      padding: 12px 16px; border-top: 1px solid var(--border-color);
      font-size: 11px; color: var(--text-secondary);
    }

    /* Content Area */
    #content-area {
      position: absolute; top: var(--tab-bar-height); left: var(--sidebar-width);
      right: 0; bottom: 0; padding: 24px; overflow-y: auto;
    }
    #content-area h2 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
    #content-area p { font-size: 14px; color: var(--text-secondary); line-height: 1.6; max-width: 600px; }
    .dashboard-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px; margin-top: 20px;
    }
    .dashboard-card {
      background: var(--bg-secondary); border: 1px solid var(--border-color);
      border-radius: 8px; padding: 20px;
    }
    .dashboard-card h3 { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
    .dashboard-card .value { font-size: 28px; font-weight: 700; color: var(--text-primary); }
    .dashboard-card .sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
    .empty-state h2 { font-size: 20px; margin-bottom: 8px; }
    .empty-state p { color: var(--text-secondary); font-size: 14px; }
  
    /* ===== Analytics View ===== */
    .analytics-view { display: flex; flex-direction: column; gap: 24px; }

    .analytics-header {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      flex-wrap: wrap;
    }
    .analytics-header h2 { margin-bottom: 0; }

    .account-selector {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text-secondary);
    }
    .account-selector select {
      background: var(--bg-secondary); color: var(--text-primary);
      border: 1px solid var(--border-color); border-radius: 4px;
      padding: 4px 8px; font-size: 12px; cursor: pointer;
    }

    .analytics-summary {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }

    .analytics-section { margin-top: 8px; }
    .analytics-section h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }

    .insight-empty {
      background: var(--bg-secondary); border: 1px dashed var(--border-color);
      border-radius: 8px; padding: 24px; text-align: center;
      color: var(--text-secondary); font-size: 13px;
    }
    .insight-empty h3 { font-size: 14px; margin-bottom: 8px; color: var(--text-secondary); }
    .insight-empty p { margin: 0 auto; }

    /* Chart container */
    .chart-container {
      background: var(--bg-secondary); border: 1px solid var(--border-color);
      border-radius: 8px; padding: 16px;
    }
    .chart-container svg { display: block; }

    /* Heatmap */
    .heatmap-container {
      background: var(--bg-secondary); border: 1px solid var(--border-color);
      border-radius: 8px; padding: 16px;
    }
    .heatmap-controls {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .heatmap-label { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .heatmap-sort {
      background: var(--bg-primary); color: var(--text-primary);
      border: 1px solid var(--border-color); border-radius: 4px;
      padding: 4px 8px; font-size: 11px; cursor: pointer;
    }
    .heatmap-grid-wrapper { overflow-x: auto; }
    .heatmap-header-row {
      display: flex; gap: 2px; margin-bottom: 2px; margin-left: 40px;
    }
    .heatmap-corner { width: 40px; flex-shrink: 0; }
    .heatmap-col-header {
      width: 32px; flex-shrink: 0; text-align: center;
      font-size: 10px; color: var(--text-secondary); padding-bottom: 4px;
    }
    .heatmap-row { display: flex; gap: 2px; margin-bottom: 2px; }
    .heatmap-row-label {
      width: 40px; flex-shrink: 0; text-align: right; padding-right: 4px;
      font-size: 9px; color: var(--text-secondary); line-height: 24px;
    }
    .heatmap-cell {
      width: 32px; height: 24px; border-radius: 2px; flex-shrink: 0;
      cursor: pointer; transition: transform 0.1s;
    }
    .heatmap-cell:hover { transform: scale(1.3); z-index: 10; }
    .heatmap-cell.excluded { background-color: #2a2a3a !important; opacity: 0.5 !important; }

    .heatmap-legend {
      display: flex; align-items: center; gap: 8px; margin-top: 12px;
      flex-wrap: wrap; font-size: 11px; color: var(--text-secondary);
    }
    .legend-gradient { display: flex; gap: 1px; }
    .legend-color { width: 20px; height: 12px; border-radius: 2px; }
    .legend-divider { width: 1px; height: 16px; background: var(--border-color); }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-swatch { width: 12px; height: 12px; border-radius: 2px; }
    .legend-swatch.excluded-swatch { background: #2a2a3a; opacity: 0.5; }

    /* Top/Bottom Posts */
    .analytics-posts-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    }
    @media (max-width: 900px) { .analytics-posts-grid { grid-template-columns: 1fr; } }
    .post-list-container { margin-top: 8px; }
    .post-list-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .post-list { display: flex; flex-direction: column; gap: 8px; }
    .post-list-item {
      display: flex; align-items: flex-start; gap: 12px;
      background: var(--bg-secondary); border: 1px solid var(--border-color);
      border-radius: 6px; padding: 12px;
    }
    .post-list-rank {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: var(--text-secondary);
      background: rgba(255,255,255,0.05);
    }
    .post-list-content { flex: 1; min-width: 0; }
    .post-list-text {
      font-size: 13px; color: var(--text-primary); line-height: 1.4;
      overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .post-list-meta {
      display: flex; gap: 8px; margin-top: 4px;
      font-size: 11px; color: var(--text-secondary);
    }
    .post-list-score { flex-shrink: 0; }
    .score-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 12px; font-weight: 700;
    }
    .score-high { background: rgba(76,175,80,0.2); color: #4caf50; }
    .score-medium { background: rgba(255,152,0,0.2); color: #ff9800; }
    .score-low { background: rgba(233,69,96,0.2); color: #e94560; }

    /* Loading spinner */
    .loading-state { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border-color);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }</style>
</head>
<body>
  <div id="root"></div>
  <script src="bundle.js"></script>
</body>
</html>
